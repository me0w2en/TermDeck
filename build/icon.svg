<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d24"/>
      <stop offset="100%" stop-color="#111318"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <rect x="4" y="4" width="1016" height="1016" rx="224" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>

  <!-- Back card (offset) — the "deck" layer -->
  <rect x="260" y="220" width="540" height="400" rx="40" fill="url(#card)" stroke="rgba(255,255,255,0.08)" stroke-width="3"/>

  <!-- Front card — main terminal -->
  <rect x="224" y="310" width="576" height="430" rx="44" fill="url(#card)" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>

  <!-- Terminal prompt  >_  -->
  <g transform="translate(324, 460)">
    <!-- > chevron -->
    <path
      d="M0 0 L60 50 L0 100"
      fill="none"
      stroke="#c8cdd5"
      stroke-width="36"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.85"
    />
    <!-- _ cursor -->
    <rect x="100" y="80" width="70" height="8" rx="4" fill="#c8cdd5" opacity="0.5"/>
  </g>
</svg>
